<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inactive Machines - Manufaktur Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: #0b0b14;
            color: #ffffff;
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .header {
            background: rgba(20, 20, 35, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 1.25rem;
        }

        .nav-links a {
            font-weight: 600;
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .nav-links a:hover {
            background: rgba(255, 118, 24, 0.17);
            color: #ff7618;
        }

        .container {
            max-width: 1120px;
            margin: 0 auto;
            padding: 2rem 1.5rem 3rem;
        }

        .page-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #ff7618, #00d4ff);
            -webkit-background-clip: text;
            -moz-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .button-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .button {
            background: #ff7618;
            border: none;
            color: #111;
            padding: 0.85rem 1.4rem;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(255, 118, 24, 0.3);
        }

        .button.secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.3rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 1.25rem;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 35px rgba(255, 118, 24, 0.15);
        }

        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: #ff7618;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.95rem;
            color: #c5c5c5;
            margin-top: 0.4rem;
        }

        .charts-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 1.25rem;
        }

        .chart-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.9rem;
            text-align: center;
            color: #e6e6e6;
        }

        .machines-list {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 1.25rem;
        }

        .list-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #e6e6e6;
        }

        .machine-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            gap: 1rem;
        }

        .machine-item:last-child {
            border-bottom: none;
        }

        .machine-info {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .machine-name {
            font-weight: 700;
            color: #ffffff;
        }

        .machine-meta {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
        }

        .machine-status {
            padding: 0.25rem 0.7rem;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-active {
            background: rgba(0, 212, 255, 0.12);
            color: #00d4ff;
        }

        .status-inactive {
            background: rgba(255, 118, 24, 0.12);
            color: #ff7618;
        }

        .status-failed {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }

        .loading,
        .error {
            text-align: center;
            padding: 1.6rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .error {
            color: #ff6b6b;
        }

        @media (max-width: 900px) {
            .charts-section {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 520px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .header {
                padding: 0.75rem 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1>Manufaktur Solutions</h1>
        <nav class="nav-links">
            <a href="Dashboard.html">Dashboard</a>
            <a href="index.html">Home</a>
        </nav>
    </header>

    <div class="container">
        <h1 class="page-title">Inactive Machines Overview</h1>

        <div class="button-bar">
            <button class="button" id="refresh-data-btn">Refresh</button>
            <button class="button secondary" id="back-dashboard-btn">Back to Dashboard</button>
            <span id="last-updated" style="color: rgba(255,255,255,0.75); font-size: 0.9rem; align-self: center;"></span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-machines">0</div>
                <div class="stat-label">Total Machines</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-failed">0</div>
                <div class="stat-label">Active Machines</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="inactive-count">0</div>
                <div class="stat-label">Inactive Machines</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="failure-rate">0%</div>
                <div class="stat-label">Inactive Rate</div>
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-card">
                <h3 class="chart-title">Machine Status Distribution</h3>
                <canvas id="statusChart"></canvas>
            </div>
            <div class="chart-card">
                <h3 class="chart-title">Inactive Trends (Last 7 Days)</h3>
                <canvas id="trendsChart"></canvas>
            </div>
        </div>

        <div class="machines-list">
            <h3 class="list-title">Inactive Machines</h3>
            <div id="machines-container">
                <div class="loading">Loading machines...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        const MACHINES_ENDPOINT = '/machines';

        let statusChart = null;
        let trendsChart = null;

        function formatStatus(machine) {
            const code = (machine.MachineStatus || '').toString();
            if (code === '0') return 'Active';
            if (code === '1') return 'Inactive';
            if (code === '2') return 'Failed';
            return 'Unknown';
        }

        function statusClass(status) {
            return `status-${status.toLowerCase()}`;
        }

        function displayError(message) {
            const container = document.getElementById('machines-container');
            container.innerHTML = `<div class="error">${message}</div>`;
        }

        function updateLastUpdated() {
            const lastUpdatedEl = document.getElementById('last-updated');
            if (!lastUpdatedEl) return;
            const now = new Date();
            lastUpdatedEl.textContent = `Last updated: ${now.toLocaleTimeString()}`;
        }

        async function fetchAllMachines() {
            try {
                const response = await fetch(`${API_BASE_URL}${MACHINES_ENDPOINT}`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                return Array.isArray(data) ? data : [];
            } catch (error) {
                console.error('Error fetching machines:', error);
                displayError('Unable to load machine data. Please ensure the backend server is running.');
                return [];
            }
        }

        function updateStats(allMachines) {
            const totalMachines = allMachines.length;
            const failedMachines = allMachines.filter(m => (m.MachineStatus || '') === '2');
            const inactiveMachines = allMachines.filter(m => (m.MachineStatus || '') === '1');
            const activeMachines = allMachines.filter(m => (m.MachineStatus || '') === '0');

            const failureRate = totalMachines > 0 ? ((inactiveMachines.length / totalMachines) * 100).toFixed(1) : '0.0';

            document.getElementById('total-machines').textContent = totalMachines;
            document.getElementById('total-failed').textContent = activeMachines.length;
            document.getElementById('inactive-count').textContent = inactiveMachines.length;
            document.getElementById('failure-rate').textContent = `${failureRate}%`;

            updateLastUpdated();
        }

        function renderCharts(allMachines) {
            const failedCount = allMachines.filter(m => (m.MachineStatus || '') === '2').length;
            const inactiveCount = allMachines.filter(m => (m.MachineStatus || '') === '1').length;
            const activeCount = allMachines.filter(m => (m.MachineStatus || '') === '0').length;

            const statusCtx = document.getElementById('statusChart').getContext('2d');
            const trendsCtx = document.getElementById('trendsChart').getContext('2d');

            if (statusChart) statusChart.destroy();
            statusChart = new Chart(statusCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Active', 'Inactive', 'Failed'],
                    datasets: [{
                        data: [activeCount, inactiveCount, failedCount],
                        backgroundColor: ['#00d4ff', '#ff7618', '#ff6b6b'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#ffffff'
                            }
                        }
                    }
                }
            });

            // Build simple last-7-day failure trend based on createdAt
            const range = Array.from({ length: 7 }, (_, i) => {
                const date = new Date();
                date.setDate(date.getDate() - (6 - i));
                return date;
            });

            const trendLabels = range.map(d => d.toLocaleDateString(undefined, { weekday: 'short' }));
            const failuresByDay = range.map(day => {
                const dayStart = new Date(day);
                dayStart.setHours(0, 0, 0, 0);
                const dayEnd = new Date(dayStart);
                dayEnd.setHours(23, 59, 59, 999);
                return allMachines.filter(m => (m.MachineStatus || '') === '1' && m.createdAt && new Date(m.createdAt) >= dayStart && new Date(m.createdAt) <= dayEnd).length;
            });

            if (trendsChart) trendsChart.destroy();
            trendsChart = new Chart(trendsCtx, {
                type: 'line',
                data: {
                    labels: trendLabels,
                    datasets: [{
                        label: 'Inactive',
                        data: failuresByDay,
                        borderColor: '#ff7618',
                        backgroundColor: 'rgba(255, 118, 24, 0.2)',
                        tension: 0.3,
                        pointRadius: 4,
                        pointBackgroundColor: '#ff7618'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#ffffff' }
                        },
                        x: {
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            ticks: { color: '#ffffff' }
                        }
                    }
                }
            });
        }

        function renderMachinesList(allMachines) {
            const container = document.getElementById('machines-container');
            const list = allMachines.filter(m => (m.MachineStatus || '').toString() === '1');

            if (!list.length) {
                container.innerHTML = '<div class="error">No inactive machines found.</div>';
                return;
            }

            container.innerHTML = '';

            list.forEach(machine => {
                const status = formatStatus(machine);
                const item = document.createElement('div');
                item.className = 'machine-item';

                item.innerHTML = `
                    <div class="machine-info">
                        <div class="machine-name">${machine.machineId || machine.machineModel || 'Unknown'}</div>
                        <div class="machine-meta">${machine.machineModel || ''} · ${machine.MachineType || ''}</div>
                    </div>
                    <div class="machine-status ${statusClass(status)}">${status}</div>
                `;

                container.appendChild(item);
            });
        }

        async function refresh() {
            const allMachines = await fetchAllMachines();
            updateStats(allMachines);
            renderCharts(allMachines);
            renderMachinesList(allMachines);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const refreshBtn = document.getElementById('refresh-data-btn');
            if (refreshBtn) refreshBtn.addEventListener('click', refresh);

            const backBtn = document.getElementById('back-dashboard-btn');
            if (backBtn) backBtn.addEventListener('click', () => {
                window.location.href = 'Dashboard.html';
            });

            refresh();
        });
    </script>
</body>
</html>
